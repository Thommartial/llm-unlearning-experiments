# Free-Colab T4 run: gpt2-medium (355M, non-gated) on TOFU.
# Full fine-tune fits comfortably in 16 GB; finishes in minutes on a T4.
name: tofu_colab_gpt2med
seed: 42
output_dir: results
device: auto
model:
  name: gpt2-medium
  dtype: float32
data:
  dataset: tofu
  forget_fraction: 0.1
  holdout_fraction: 0.2
  max_samples: null
  max_length: 128
unlearn:
  method: npo            # stable; avoids the divergence risk of raw gradient ascent
  finetune_epochs: 4
  epochs: 2
  learning_rate: 1.0e-5
  finetune_lr: 2.0e-5
  batch_size: 4
  beta: 0.1
attack:
  method: min_k_prob
  min_k: 0.2
