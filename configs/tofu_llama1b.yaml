# Full configured run. Intended for a cloud T4 (16 GB) with LoRA/QLoRA.
name: tofu_llama1b
seed: 42
output_dir: results
model:
  name: meta-llama/Llama-3.2-1B
  dtype: bfloat16
data:
  dataset: tofu
  forget_fraction: 0.05
  max_samples: null
unlearn:
  method: npo
  epochs: 3
  learning_rate: 1.0e-5
  batch_size: 4
attack:
  method: min_k_prob
  min_k: 0.2
